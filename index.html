<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check iptv - Dominios por servidor</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #0a1a2a 100%);
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
            color: #00ffcc;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .caja {
            background: rgba(0,0,0,0.6);
            border: 2px solid #00ffcc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .titulo-seccion {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
            color: #ffaa00;
        }
        .credito {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 10px;
            animation: parpadeo 1.2s infinite;
        }
        @keyframes parpadeo {
            0% { opacity: 1; text-shadow: 0 0 5px #ff6600, 0 0 10px #ff6600; color: #ff6600; }
            50% { opacity: 0.4; text-shadow: 0 0 2px #ffaa00, 0 0 5px #ffaa00; color: #ffaa00; }
            100% { opacity: 1; text-shadow: 0 0 5px #ff6600, 0 0 10px #ff6600; color: #ff6600; }
        }
        .linea {
            border-bottom: 1px solid #00ffcc;
            margin-bottom: 20px;
            width: 100%;
        }
        label { display: block; margin-top: 15px; font-weight: bold; color: #ffaa00; font-size: 14px; }
        input, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            font-family: monospace;
            box-sizing: border-box;
        }
        input { background: #1a1a2e; color: #00ffcc; border: 1px solid #00ffcc; }
        button {
            background: linear-gradient(90deg, #00ffcc, #0099ff);
            color: #000;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover { filter: brightness(0.9); transform: scale(1.02); }
        .checkbox-row { margin-top: 15px; display: flex; align-items: center; gap: 10px; }
        .checkbox-row input { width: auto; margin-top: 0; }
        .checkbox-row label { margin-top: 0; display: inline; }
        .log-area {
            background: #00000066;
            border-radius: 10px;
            padding: 10px;
            height: 150px;
            overflow-y: auto;
            font-size: 11px;
            font-family: monospace;
            margin-bottom: 15px;
            border: 1px solid #00ffcc33;
        }
        .log-entry { padding: 3px; margin: 2px 0; font-size: 10px; border-left: 2px solid #00ffcc; padding-left: 8px; }
        .resultado-area {
            background: #00000066;
            border-radius: 10px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            font-size: 12px;
            white-space: pre-wrap;
            font-family: monospace;
            border: 1px solid #00ffcc33;
            margin-top: 15px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #00ffcc;
            border-top-color: transparent;
            border-radius: 50%;
            animation: girar 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes girar { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .button-group button {
            flex: 1;
            margin-top: 0;
        }
        .btn-copiar {
            background: linear-gradient(90deg, #ffaa00, #ff6600);
        }
        .btn-descargar {
            background: linear-gradient(90deg, #00ffaa, #00cc66);
        }
        /* Estilos para el botón de comunidad */
        .comunidad-btn {
            background: linear-gradient(135deg, #ff66cc, #6600cc);
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            padding: 12px;
            letter-spacing: 2px;
            border: 1px solid #ffcc00;
            box-shadow: 0 0 10px rgba(255, 102, 204, 0.5);
        }
        .comunidad-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255, 102, 204, 0.8);
        }
        .footer {
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- SECCIÓN DOMINIOS POR SERVIDOR -->
    <div class="caja">
        <div class="titulo-seccion">🔗 DOMINIOS PARALELOS POR SERVIDOR</div>
        <div class="credito">😎 ANGEL EXSPECTRUS</div>
        <div class="linea"></div>
        <label>🌐 Ingrese un servidor:</label>
        <input type="text" id="servidorInput" placeholder="Ej: http://redworld.pro:8080" />
        <div class="checkbox-row">
            <input type="checkbox" id="buscarPuertosServidor">
            <label>🔌 Buscar puertos abiertos en los espejos encontrados</label>
        </div>
        <button id="btnBuscarServidor">🔍 BUSCAR DOMINIOS</button>
        <div id="logServidor" class="log-area"></div>
        <div id="resultadoServidor" class="resultado-area"></div>
        <div class="button-group" id="botonesAccion" style="display:none;">
            <button id="btnCopiarServidor" class="btn-copiar">📋 COPIAR RESULTADOS</button>
            <button id="btnDescargarServidor" class="btn-descargar">💾 DESCARGAR RESULTADOS</button>
        </div>
    </div>

    <!-- Botón Comunidad Innovación -->
    <div class="footer">
        <button id="btnComunidad" class="comunidad-btn">✨ COMUNIDAD INNOVACIÓN ✨</button>
    </div>
</div>

<textarea id="tempTextarea" style="position:absolute; left:-9999px; top:-9999px; opacity:0;"></textarea>
<div id="copyNotification" style="position:fixed; top:20px; right:20px; background-color:#00cc00; color:black; padding:10px 20px; border-radius:5px; font-weight:bold; display:none; z-index:1000;">✅ Copiado al portapapeles</div>

<script>
// ==================== DOMINIOS POR SERVIDOR ====================
const PUERTOS_ESPEJOS = [25461, 25463, 8443, 2083, 2086, 8080, 8081, 8000, 8880, 8008, 443, 80, 2052];

function esperar(ms) { return new Promise(r => setTimeout(r, ms)); }

function mostrarNotificacion(mensaje) {
    const n = document.getElementById('copyNotification');
    n.textContent = mensaje;
    n.style.display = 'block';
    setTimeout(() => n.style.display = 'none', 2000);
}

function copiarTexto(texto) {
    const textarea = document.getElementById('tempTextarea');
    textarea.value = texto;
    textarea.select();
    document.execCommand('copy');
    textarea.blur();
    mostrarNotificacion('✅ Resultados copiados');
}

function limpiarNombreServidor(servidor) {
    let limpio = servidor.trim();
    limpio = limpio.replace(/^https?:\/\//, '');
    limpio = limpio.replace(/\/$/, '');
    limpio = limpio.replace(/:\d+$/, '');
    limpio = limpio.replace(/[^a-zA-Z0-9.-]/g, '');
    return limpio || 'servidor';
}

function descargarTexto(texto, nombreServidor) {
    const nombreLimpio = limpiarNombreServidor(nombreServidor);
    const nombreArchivo = `Dominios-${nombreLimpio}.txt`;
    const blob = new Blob([texto], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = nombreArchivo;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    mostrarNotificacion(`💾 Descargado: ${nombreArchivo}`);
}

function limpiarHostDominio(entrada) {
    let limpio = entrada.trim();
    limpio = limpio.replace(/^https?:\/\//, '');
    limpio = limpio.replace(/\/$/, '');
    if (limpio.includes(':')) limpio = limpio.split(':')[0];
    if (limpio.includes('/')) limpio = limpio.split('/')[0];
    return limpio;
}

async function seguirRedirecciones(url) {
    try {
        let urlLimpia = url;
        if (!urlLimpia.startsWith('http://') && !urlLimpia.startsWith('https://')) urlLimpia = 'http://' + urlLimpia;
        const response = await fetch(urlLimpia, { method: 'HEAD', redirect: 'follow' });
        return response.url !== urlLimpia ? response.url : urlLimpia;
    } catch(e) { return url; }
}

async function getServerCountry(ip) {
    try {
        const response = await fetch(`http://ip-api.com/json/${ip}`);
        if (response.ok) {
            const data = await response.json();
            if (data.status === 'success') {
                const flag = data.countryCode ? String.fromCodePoint(...[...data.countryCode].map(c => 127397 + c.charCodeAt())) : '';
                return { country: data.country || "Desconocido", flag: flag, city: data.city || "Desconocido", region: data.regionName || "Desconocido", isp: data.isp || "Desconocido", ip: ip };
            }
        }
    } catch(e) {}
    return { country: "Desconocido", flag: "", city: "Desconocido", region: "Desconocido", isp: "Desconocido", ip: ip };
}

async function obtenerInfoHost(host, logCallback) {
    logCallback(`${'═'.repeat(43)}`, 'info');
    logCallback(`Servidor: ${host}`, 'info');
    logCallback(`${'═'.repeat(43)}`, 'info');
    try {
        const response = await fetch(`https://ipleak.net/json/${host}`);
        if (response.ok) {
            const data = await response.json();
            if (data.ips && Object.keys(data.ips).length > 0) {
                const primeraIP = Object.keys(data.ips)[0];
                const ipdata = data.ips[primeraIP];
                const extra = await getServerCountry(host);
                logCallback(`🔒 IP: ${ipdata.ip || 'N/A'}`, 'exito');
                logCallback(`🌍 País: ${extra.country} ${extra.flag}`, 'exito');
                logCallback(`🏙️ Región: ${extra.region}`, 'info');
                logCallback(`🏡 Ciudad: ${extra.city}`, 'info');
                logCallback(`🏢 ISP: ${extra.isp}`, 'info');
                return { ip: ipdata.ip || 'N/A', country: extra.country, flag: extra.flag, region: extra.region, city: extra.city, isp: extra.isp };
            }
        }
        logCallback(`❌ No se pudo obtener info del host.`, 'error');
    } catch(e) { logCallback(`❌ Error: ${e.message}`, 'error'); }
    return null;
}

async function busquedaInversaHostIO(ip, logCallback) {
    const dominios = [];
    for (let intento = 0; intento < 3; intento++) {
        try {
            logCallback(`📡 Intento ${intento+1}/3: Consultando Host.io...`, 'info');
            const response = await fetch(`https://host.io/ip/${ip}`);
            const html = await response.text();
            const regex = /<a href="\/([^"]+)" class="border-b border-gray-400" rel="nofollow">([^<]+)<\/a>/gi;
            let match;
            while ((match = regex.exec(html)) !== null) {
                const dominio = match[2].trim();
                if (dominio && !dominios.includes(dominio) && dominio.includes('.')) dominios.push(dominio);
            }
            if (dominios.length > 0) { logCallback(`   ✅ Host.io: ${dominios.length} dominios encontrados`, 'exito'); break; }
            else if (intento < 2) { logCallback(`   ⚠️ Reintentando...`, 'info'); await esperar(3000); }
        } catch(e) { if (intento < 2) await esperar(3000); else logCallback(`   ❌ Error: ${e.message}`, 'error'); }
    }
    return dominios;
}

async function buscarPuertosParaDominio(dominio, logCallback) {
    const puertosAbiertos = [];
    const dominioLimpio = dominio.split(':')[0];
    for (const puerto of PUERTOS_ESPEJOS) {
        try {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 2000);
            await fetch(`http://${dominioLimpio}:${puerto}`, { mode: 'no-cors', signal: controller.signal });
            clearTimeout(timeoutId);
            puertosAbiertos.push(puerto);
            if (logCallback) logCallback(`✅ Puerto ${puerto}: ABIERTO`, 'exito');
        } catch(e) {}
    }
    return puertosAbiertos;
}

async function buscarPuertosParaTodosDominios(dominios, logCallback) {
    const resultados = {};
    for (let i = 0; i < dominios.length; i++) {
        const dominio = dominios[i];
        if (logCallback) logCallback(`📡 [${i+1}/${dominios.length}] Escaneando: ${dominio}`, 'info');
        const puertos = await buscarPuertosParaDominio(dominio, logCallback);
        if (puertos.length > 0) resultados[dominio] = puertos;
        await esperar(200);
    }
    return resultados;
}

let ultimoResultadoServidor = null;
let ultimoTextoGenerado = '';
let ultimoServidorNombre = '';

function generarTextoResultado(entrada, infoHost, dominios, puertosPorDominio) {
    let texto = `• Dᴏᴍɪɴɪᴏs ᴘᴏʀ sᴇʀᴠɪᴅᴏʀ\n• Cʀᴇᴀᴅᴏʀ Aɴɢᴇʟ Exsᴘᴇᴄᴛʀᴜs\n\n🔗 Dᴏᴍɪɴɪᴏ: ${entrada}\n📍 Iᴘ: ${infoHost.ip}\n🌍 Pᴀɪs: ${infoHost.country} ${infoHost.flag}\n🏙️ Rᴇɢɪᴏɴ: ${infoHost.region}\n🏡 Cɪᴜᴅᴀᴅ: ${infoHost.city}\n🏢 Isᴘ: ${infoHost.isp}\n👁 Dᴏᴍɪɴɪᴏs ᴛᴏᴛᴀʟᴇs: ${dominios.length}\n\n╭──➤ 🔎 Rᴇᴠᴇʀsᴇ-IP Lᴏᴏᴋᴜᴘ:\n\n`;
    for (let i = 0; i < dominios.length; i++) {
        const dom = dominios[i];
        if (puertosPorDominio && puertosPorDominio[dom]) texto += `📡 ${dom} → Pᴜᴇʀᴛᴏs: ${puertosPorDominio[dom].join(', ')}\n`;
        else texto += `📡 ${dom}\n`;
    }
    return texto;
}

document.getElementById('btnBuscarServidor').onclick = async () => {
    const entrada = document.getElementById('servidorInput').value.trim();
    const buscarPuertos = document.getElementById('buscarPuertosServidor').checked;
    const logDiv = document.getElementById('logServidor');
    const resultadosDiv = document.getElementById('resultadoServidor');
    const botonesAccion = document.getElementById('botonesAccion');
    
    if (!entrada) { alert("Ingrese un servidor"); return; }
    
    logDiv.innerHTML = '';
    resultadosDiv.innerHTML = '<div class="spinner"></div> Buscando...';
    botonesAccion.style.display = 'none';
    
    let logs = [];
    function agregarLog(mensaje, tipo) {
        const color = tipo === 'error' ? '#ff5555' : tipo === 'exito' ? '#55ff55' : '#00ffcc';
        logs.push(`<div class="log-entry" style="border-left-color: ${color}">${mensaje}</div>`);
        logDiv.innerHTML = logs.join('');
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    
    try {
        agregarLog(`🔄 Siguiendo redirecciones...`, 'info');
        const urlFinal = await seguirRedirecciones(entrada);
        if (urlFinal !== entrada) agregarLog(`🔄 Redirigido: ${entrada} → ${urlFinal}`, 'info');
        
        const host = limpiarHostDominio(urlFinal);
        if (!host) { resultadosDiv.innerHTML = `<div style="color:#ff5555">❌ Dominio no válido</div>`; return; }
        
        agregarLog(`📡 Host: ${host}`, 'info');
        const infoHost = await obtenerInfoHost(host, agregarLog);
        if (!infoHost) { resultadosDiv.innerHTML = `<div style="color:#ff5555">❌ No se pudo obtener información</div>`; return; }
        
        agregarLog(`\n🔎 Búsqueda inversa en IP: ${infoHost.ip}`, 'info');
        const dominios = await busquedaInversaHostIO(infoHost.ip, agregarLog);
        
        if (dominios.length === 0) { resultadosDiv.innerHTML = `<div style="color:#ffaa00">⚠️ No se encontraron dominios</div>`; return; }
        
        agregarLog(`📋 Total: ${dominios.length} dominios`, 'exito');
        
        let puertosPorDominio = null;
        if (buscarPuertos) {
            agregarLog(`\n🔌 Escaneando puertos...`, 'info');
            puertosPorDominio = await buscarPuertosParaTodosDominios(dominios, agregarLog);
        }
        
        let html = `${'═'.repeat(38)}\n🔗 Dominio: ${entrada}\n📍 IP: ${infoHost.ip}\n🌍 País: ${infoHost.country} ${infoHost.flag}\n🏙️ Región: ${infoHost.region}\n🏡 Ciudad: ${infoHost.city}\n🏢 ISP: ${infoHost.isp}\n👁 Dominios totales: ${dominios.length}\n\n╭──➤ 🔎 Reverse-IP Lookup:\n\n`;
        
        for (let i = 0; i < dominios.length; i++) {
            const dom = dominios[i];
            if (puertosPorDominio && puertosPorDominio[dom]) html += `📡 ${dom} → Puertos: ${puertosPorDominio[dom].join(', ')}\n`;
            else html += `📡 ${dom}\n`;
        }
        
        resultadosDiv.innerHTML = html.replace(/\n/g, '<br>');
        
        ultimoServidorNombre = host;
        ultimoTextoGenerado = generarTextoResultado(entrada, infoHost, dominios, puertosPorDominio);
        ultimoResultadoServidor = { entrada, infoHost, dominios, puertosPorDominio };
        botonesAccion.style.display = 'flex';
        
    } catch(e) { 
        agregarLog(`❌ Error: ${e.message}`, 'error'); 
        resultadosDiv.innerHTML = `<div style="color:#ff5555">❌ Error: ${e.message}</div>`; 
    }
};

document.getElementById('btnCopiarServidor').onclick = () => {
    if (ultimoTextoGenerado) {
        copiarTexto(ultimoTextoGenerado);
    }
};

document.getElementById('btnDescargarServidor').onclick = () => {
    if (ultimoTextoGenerado && ultimoServidorNombre) {
        descargarTexto(ultimoTextoGenerado, ultimoServidorNombre);
    } else if (ultimoTextoGenerado) {
        const entrada = document.getElementById('servidorInput').value.trim();
        descargarTexto(ultimoTextoGenerado, entrada || 'servidor');
    }
};

// ==================== BOTÓN COMUNIDAD INNOVACIÓN ====================
document.getElementById('btnComunidad').onclick = () => {
    window.open('https://angel-iluminaty.github.io/IluminatyPages/', '_blank');
};
</script>
</body>
</html>
